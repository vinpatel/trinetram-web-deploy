<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="TriNetram concept architecture — six-capability block diagram">
  <title>TriNetram concept architecture</title>
  <desc>Blueprint-style block diagram of the six-capability architecture. Ink (#0A0A0A) line work on paper (#FAFAFA), single lens-accent (#0066FF) on the central AI Compute block. No gradients, no shadows. Per DESIGN.md §8.</desc>

  <!-- paper -->
  <rect width="1200" height="800" fill="#FAFAFA"/>

  <!-- ────────────────────────────────────────────────────────────── -->
  <!-- arrowhead marker definition (ink + lens variants) -->
  <!-- ────────────────────────────────────────────────────────────── -->
  <defs>
    <marker id="arrow-ink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0A0A0A"/>
    </marker>
    <marker id="arrow-lens" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0066FF"/>
    </marker>
  </defs>

  <!-- ────────────────────────────────────────────────────────────── -->
  <!-- header / caption -->
  <!-- ────────────────────────────────────────────────────────────── -->
  <text x="40" y="42" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="14" fill="#0A0A0A" letter-spacing="1.2">CONCEPT ARCHITECTURE — TriNetram</text>
  <text x="40" y="62" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="10" fill="#6B6B6B" letter-spacing="0.8">Six-capability star topology · star point = NPU · arrows = data flow</text>
  <line x1="40" y1="72" x2="1160" y2="72" stroke="#B5B5B5" stroke-width="0.5"/>

  <!-- ────────────────────────────────────────────────────────────── -->
  <!-- TOP ROW: Adaptive Lens + Solar Occlusion -->
  <!-- ────────────────────────────────────────────────────────────── -->

  <!-- Adaptive Lens (top-left) -->
  <g stroke="#0A0A0A" stroke-width="1.5" fill="none">
    <rect x="180" y="120" width="260" height="110" rx="4" ry="4"/>
  </g>
  <text x="310" y="150" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="13" fill="#0A0A0A" letter-spacing="0.8">ADAPTIVE LENS</text>
  <text x="310" y="170" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="10" fill="#2E2E2E">variable-focus element</text>
  <text x="310" y="190" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="10" fill="#6B6B6B">-6.00 D … +3.00 D</text>
  <text x="310" y="212" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="9" fill="#6B6B6B" letter-spacing="0.6">CONCEPT · 80 mW peak</text>

  <!-- Solar Occlusion (top-right) -->
  <g stroke="#0A0A0A" stroke-width="1.5" fill="none">
    <rect x="760" y="120" width="260" height="110" rx="4" ry="4"/>
  </g>
  <text x="890" y="150" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="13" fill="#0A0A0A" letter-spacing="0.8">SOLAR OCCLUSION</text>
  <text x="890" y="170" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="10" fill="#2E2E2E">electrochromic film</text>
  <text x="890" y="190" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="10" fill="#6B6B6B">+ ambient/UV sensor</text>
  <text x="890" y="212" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="9" fill="#6B6B6B" letter-spacing="0.6">CONCEPT · 25 mW transition</text>

  <!-- ────────────────────────────────────────────────────────────── -->
  <!-- MIDDLE ROW: Dual Cameras + AI Compute (centre, lens-accent) + IR Sensor -->
  <!-- ────────────────────────────────────────────────────────────── -->

  <!-- Dual Cameras (left) -->
  <g stroke="#0A0A0A" stroke-width="1.5" fill="none">
    <rect x="60" y="330" width="260" height="140" rx="4" ry="4"/>
    <!-- two camera apertures as visual cue -->
    <circle cx="135" cy="385" r="10"/>
    <circle cx="135" cy="385" r="4"/>
    <circle cx="245" cy="385" r="10"/>
    <circle cx="245" cy="385" r="4"/>
  </g>
  <text x="190" y="420" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="13" fill="#0A0A0A" letter-spacing="0.8">DUAL CAMERAS</text>
  <text x="190" y="438" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="10" fill="#2E2E2E">pupil + accommodation</text>
  <text x="190" y="456" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="9" fill="#6B6B6B" letter-spacing="0.6">CONCEPT · 220 mW</text>

  <!-- AI Compute — central, lens-accent -->
  <g stroke="#0066FF" stroke-width="1.5" fill="none">
    <rect x="440" y="290" width="320" height="220" rx="4" ry="4"/>
    <!-- inner divider for "model heads" -->
    <line x1="440" y1="360" x2="760" y2="360"/>
  </g>
  <text x="600" y="320" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="15" fill="#0066FF" letter-spacing="1.0">AI COMPUTE · NPU + MCU</text>
  <text x="600" y="342" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="10" fill="#0066FF">1–4 TOPS · Cortex-M55 ref.</text>

  <text x="600" y="385" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="11" fill="#0A0A0A">▸ prescription head</text>
  <text x="600" y="405" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="11" fill="#0A0A0A">▸ face recognition head</text>
  <text x="600" y="425" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="11" fill="#0A0A0A">▸ scene understanding head</text>

  <text x="600" y="460" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="10" fill="#2E2E2E">closed loop ≤ 20 ms (target)</text>
  <text x="600" y="490" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="9" fill="#6B6B6B" letter-spacing="0.6">CONCEPT · 650 mW active</text>

  <!-- IR / SWIR sensor (right) -->
  <g stroke="#0A0A0A" stroke-width="1.5" fill="none">
    <rect x="880" y="330" width="260" height="140" rx="4" ry="4"/>
    <!-- IR aperture cue: concentric ring -->
    <circle cx="1010" cy="378" r="14"/>
    <circle cx="1010" cy="378" r="7"/>
    <circle cx="1010" cy="378" r="2"/>
  </g>
  <text x="1010" y="420" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="13" fill="#0A0A0A" letter-spacing="0.8">IR / SWIR SENSOR</text>
  <text x="1010" y="438" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="10" fill="#2E2E2E">~1.4 µm night vision</text>
  <text x="1010" y="456" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="9" fill="#6B6B6B" letter-spacing="0.6">CONCEPT · 180 mW</text>

  <!-- ────────────────────────────────────────────────────────────── -->
  <!-- BOTTOM ROW: Comms + Power -->
  <!-- ────────────────────────────────────────────────────────────── -->
  <g stroke="#0A0A0A" stroke-width="1.5" fill="none">
    <rect x="180" y="600" width="840" height="120" rx="4" ry="4"/>
    <line x1="460" y1="600" x2="460" y2="720"/>
    <line x1="740" y1="600" x2="740" y2="720"/>
  </g>

  <text x="320" y="635" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="12" fill="#0A0A0A" letter-spacing="0.8">COMMS</text>
  <text x="320" y="658" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="10" fill="#2E2E2E">BLE 5.4 · Wi-Fi 6</text>
  <text x="320" y="678" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="10" fill="#6B6B6B">app sync · OTA</text>
  <text x="320" y="702" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="9" fill="#6B6B6B" letter-spacing="0.6">CONCEPT · 45 mW typ.</text>

  <text x="600" y="635" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="12" fill="#0A0A0A" letter-spacing="0.8">BATTERY</text>
  <text x="600" y="658" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="10" fill="#2E2E2E">Li-Po · 1200 mWh</text>
  <text x="600" y="678" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="10" fill="#6B6B6B">split temple-tip cells</text>
  <text x="600" y="702" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="9" fill="#6B6B6B" letter-spacing="0.6">CONCEPT · ~10–12 h duty</text>

  <text x="880" y="635" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="12" fill="#0A0A0A" letter-spacing="0.8">POWER MGMT</text>
  <text x="880" y="658" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="10" fill="#2E2E2E">PMIC · USB-C 5 W</text>
  <text x="880" y="678" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="10" fill="#6B6B6B">SoC reports to NPU</text>
  <text x="880" y="702" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="9" fill="#6B6B6B" letter-spacing="0.6">CONCEPT · 10% overhead</text>

  <!-- ────────────────────────────────────────────────────────────── -->
  <!-- ARROWS — data flow into/out of the central NPU -->
  <!-- ────────────────────────────────────────────────────────────── -->
  <g stroke="#0A0A0A" stroke-width="1.5" fill="none" stroke-linecap="round">
    <!-- NPU → Adaptive Lens (top-left, diopter cmd) -->
    <polyline points="500,290 500,230" marker-end="url(#arrow-ink)"/>
    <!-- NPU → Solar Occlusion (top-right, opacity cmd) -->
    <polyline points="700,290 700,230" marker-end="url(#arrow-ink)"/>

    <!-- Dual Cameras → NPU (MIPI) -->
    <polyline points="320,400 440,400" marker-end="url(#arrow-ink)"/>
    <!-- IR Sensor → NPU (MIPI) -->
    <polyline points="880,400 760,400" marker-end="url(#arrow-ink)"/>

    <!-- NPU ↔ Comms+Power (data + power) -->
    <polyline points="600,510 600,600" marker-end="url(#arrow-ink)" marker-start="url(#arrow-ink)"/>
  </g>

  <!-- Arrow labels (kept short, in graphite) -->
  <g font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="9" fill="#6B6B6B" letter-spacing="0.4">
    <text x="510" y="265">diopter cmd</text>
    <text x="710" y="265">opacity cmd</text>
    <text x="345" y="392">MIPI · 60–120 fps</text>
    <text x="785" y="392" text-anchor="end">MIPI · gated</text>
    <text x="610" y="558">BLE / power</text>
  </g>

  <!-- ────────────────────────────────────────────────────────────── -->
  <!-- READINESS LEGEND (top-right) -->
  <!-- ────────────────────────────────────────────────────────────── -->
  <g stroke="#0A0A0A" stroke-width="1" fill="none">
    <rect x="980" y="20" width="180" height="42"/>
  </g>
  <text x="990" y="36" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="9" fill="#0A0A0A" letter-spacing="0.6">READINESS · 2026-05</text>
  <text x="990" y="52" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="9" fill="#6B6B6B">all subsystems · CONCEPT</text>

  <!-- ────────────────────────────────────────────────────────────── -->
  <!-- BOTTOM-RIGHT CAPTION — concept-render labeling discipline (BRD-06) -->
  <!-- ────────────────────────────────────────────────────────────── -->
  <text x="1160" y="775" text-anchor="end" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="10" fill="#6B6B6B" letter-spacing="0.6">Concept render — not final hardware.  2026-05</text>
</svg>
